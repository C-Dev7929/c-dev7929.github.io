<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 BXH Liên Trường - Clean Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap');
        body { font-family: 'Be Vietnam Pro', sans-serif; background: #020617; }
        .glass-effect { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .update-flash { animation: flash 0.8s ease-out; }
        @keyframes flash { 0% { background: rgba(56, 189, 248, 0.2); } 100% { background: transparent; } }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-4 md:p-12">

    <div class="max-w-5xl mx-auto">
        <header class="mb-10">
            <div class="flex flex-col md:flex-row justify-between items-end gap-6">
                <div>
                    <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic">
                        Leaderboard <span class="text-sky-500 not-italic">2026</span>
                    </h1>
                    <div class="flex items-center gap-3 mt-3">
                        <div id="status-icon" class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
                        <span id="status-text" class="text-sm font-medium text-slate-400 text-sm uppercase tracking-widest">Đang khởi tạo hệ thống...</span>
                    </div>
                </div>

                <div class="flex gap-4 p-2 bg-slate-900 rounded-2xl border border-slate-800 shadow-inner">
                    <select id="limitSelect" class="bg-transparent text-sm font-bold text-sky-400 outline-none px-4 cursor-pointer">
                        <option value="10">TOP 10</option>
                        <option value="50" selected>TOP 50</option>
                        <option value="100">TOP 100</option>
                        <option value="1000">TẤT CẢ</option>
                    </select>
                    <div class="w-[1px] h-6 bg-slate-700"></div>
                    <div class="px-4 py-1 text-xs font-black text-white" id="total-students">0 THÍ SINH</div>
                </div>
            </div>
        </header>

        <div class="glass-effect rounded-3xl overflow-hidden shadow-2xl border border-slate-800">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-900/50 text-slate-500 text-[11px] font-black uppercase tracking-[0.2em] border-b border-slate-800">
                            <th class="px-8 py-5 text-center">Hạng</th>
                            <th class="px-8 py-5">Thí sinh</th>
                            <th class="px-8 py-5">Đơn vị trường</th>
                            <th class="px-8 py-5 text-right">Điểm tổng</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-800/50">
                    </tbody>
                </table>
            </div>
            
            <div id="empty-msg" class="py-32 text-center">
                <div class="inline-block animate-pulse mb-4 text-4xl">📡</div>
                <p class="text-slate-500 font-medium">Đang thiết lập kết nối lấy dữ liệu BXH...</p>
                <p class="text-slate-600 text-xs mt-2 uppercase tracking-widest">(Yêu cầu bật Extension Allow-CORS)</p>
            </div>
        </div>
    </div>

    <script>
        // Đã cập nhật ID URL thành 14329 theo mẫu curl
        const SCHOOL_SOURCES = [
            "https://thpt-bacbinh.lamdong.dlib.vn/danh-muc/tin-tuc-su-kien/chinh-phuc-tuan-le-doc-sach-2026-vuon-minh-ky-nguyen-so-kien-tao-tuong-lai-voi-6-tram-trai-nghiem-hap-dan-14329.html",
            "https://thpt-daksong.lamdong.dlib.vn/danh-muc/tin-tuc-su-kien/chinh-phuc-tuan-le-doc-sach-2026-vuon-minh-ky-nguyen-so-kien-tao-tuong-lai-voi-6-tram-trai-nghiem-hap-dan-14329.html",
            "https://thpt-dahuoai.lamdong.dlib.vn/danh-muc/tin-tuc-su-kien/chinh-phuc-tuan-le-doc-sach-2026-vuon-minh-ky-nguyen-so-kien-tao-tuong-lai-voi-6-tram-trai-nghiem-hap-dan-14329.html",
            "https://thpt-truongchinhhoaninh.lamdong.dlib.vn/danh-muc/tin-tuc-su-kien/chinh-phuc-tuan-le-doc-sach-2026-vuon-minh-ky-nguyen-so-kien-tao-tuong-lai-voi-6-tram-trai-nghiem-hap-dan-14329.html",
            "https://thpt-dtntntranglong.lamdong.dlib.vn/danh-muc/tin-tuc-su-kien/chinh-phuc-tuan-le-doc-sach-2026-vuon-minh-ky-nguyen-so-kien-tao-tuong-lai-voi-6-tram-trai-nghiem-hap-dan-14329.html",
            "https://thcs-thpt-tayson.dongnai.dlib.vn/danh-muc/tin-tuc-su-kien/chinh-phuc-tuan-le-doc-sach-2026-vuon-minh-ky-nguyen-so-kien-tao-tuong-lai-voi-6-tram-trai-nghiem-hap-dan-14329.html",
            "https://thpt-hungvuongdran.lamdong.dlib.vn/danh-muc/tin-tuc-su-kien/chinh-phuc-tuan-le-doc-sach-2026-vuon-minh-ky-nguyen-so-kien-tao-tuong-lai-voi-6-tram-trai-nghiem-hap-dan-14329.html",
            "https://thpt-phanboichaunamdong.lamdong.dlib.vn/danh-muc/tin-tuc-su-kien/chinh-phuc-tuan-le-doc-sach-2026-vuon-minh-ky-nguyen-so-kien-tao-tuong-lai-voi-6-tram-trai-nghiem-hap-dan-14329.html",
            "https://thpt-nguyenchithanh.lamdong.dlib.vn/danh-muc/tin-tuc-su-kien/chinh-phuc-tuan-le-doc-sach-2026-vuon-minh-ky-nguyen-so-kien-tao-tuong-lai-voi-6-tram-trai-nghiem-hap-dan-14329.html"
        ];

        let uniqueStudentsMap = new Map();

        // Tham số query dựa trên curl
        const queryParams = "?camp_type=1&statistical_point_type=all";

        async function startSync() {
            const statusText = document.getElementById('status-text');
            const statusIcon = document.getElementById('status-icon');
            
            statusIcon.className = "w-2.5 h-2.5 rounded-full bg-sky-500 animate-pulse";

            for (let i = 0; i < SCHOOL_SOURCES.length; i++) {
                const baseUrl = SCHOOL_SOURCES[i];
                const schoolName = new URL(baseUrl).hostname.split('.')[0].toUpperCase().replace('THPT-', '').replace('THCS-', '');
                const fetchUrl = baseUrl + queryParams + '&_t=' + Date.now(); // Thêm timestamp để tránh cache
                
                statusText.innerText = `Đang quét: ${schoolName} (${i+1}/${SCHOOL_SOURCES.length})`;

                try {
                    // Áp dụng Headers tương tự như cấu trúc Curl
                    const response = await fetch(fetchUrl, {
                        method: 'GET',
                        headers: {
                            'accept': 'application/json, text/plain, */*',
                            'accept-language': 'en-US,en;q=0.9,vi;q=0.8'
                        }
                    });

                    if (!response.ok) throw new Error("HTTP " + response.status);

                    const htmlText = await response.text();
                    
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, "text/html");
                    
                    // Tìm tất cả các div có class winner trong response
                    const winners = doc.querySelectorAll('.winner');

                    winners.forEach(w => {
                        // Bỏ qua thành phần my-rank
                        if (w.classList.contains('my-rank')) return;
                        
                        const nameEl = w.querySelector('.name');
                        const scoreEl = w.querySelector('.score');
                        
                        const name = nameEl ? nameEl.innerText.trim() : null;
                        const scoreStr = scoreEl ? scoreEl.innerText.replace(/\D/g, '') : null;
                        const score = parseInt(scoreStr || 0);

                        if (name && score) {
                            const uniqueKey = `${name}_${schoolName}`;
                            
                            if (!uniqueStudentsMap.has(uniqueKey) || uniqueStudentsMap.get(uniqueKey).score < score) {
                                uniqueStudentsMap.set(uniqueKey, { name, score, school: schoolName });
                            }
                        }
                    });

                    renderTable();
                } catch (e) {
                    console.error(`Lỗi truy cập tại ${schoolName}:`, e);
                    statusText.innerText = "Lỗi CORS! Hãy bật Extension Allow-CORS.";
                    statusIcon.className = "w-2.5 h-2.5 rounded-full bg-red-600";
                    return; 
                }
                
                // Nghỉ 800ms giữa các trường để tránh bị chặn do ddos
                await new Promise(r => setTimeout(r, 800));
            }

            statusIcon.className = "w-2.5 h-2.5 rounded-full bg-emerald-500";
            statusText.innerText = `Cập nhật lúc: ${new Date().toLocaleTimeString()}`;
            
            // Tự động quét lại sau 30 giây
            setTimeout(startSync, 30000);
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const emptyMsg = document.getElementById('empty-msg');
            const limit = parseInt(document.getElementById('limitSelect').value);
            
            const sortedData = Array.from(uniqueStudentsMap.values())
                                    .sort((a, b) => b.score - a.score);

            document.getElementById('total-students').innerText = `${sortedData.length} THÍ SINH`;
            
            if (sortedData.length > 0) emptyMsg.style.display = 'none';

            tbody.innerHTML = sortedData.slice(0, limit).map((s, i) => {
                const rank = i + 1;
                let rankLabel = rank;
                let rowStyle = "";

                if (rank === 1) { rankLabel = "👑"; rowStyle = "text-amber-400"; }
                else if (rank === 2) { rankLabel = "🥈"; rowStyle = "text-slate-300"; }
                else if (rank === 3) { rankLabel = "🥉"; rowStyle = "text-orange-400"; }

                return `
                    <tr class="hover:bg-slate-800/30 transition-all duration-300">
                        <td class="px-8 py-5 text-center font-black text-lg ${rowStyle}">${rankLabel}</td>
                        <td class="px-8 py-5 font-bold text-white text-base">${s.name}</td>
                        <td class="px-8 py-5">
                            <span class="text-[10px] tracking-widest font-black py-1.5 px-3 rounded-lg bg-slate-900 border border-slate-700/50 text-slate-400 uppercase">
                                ${s.school}
                            </span>
                        </td>
                        <td class="px-8 py-5 text-right font-black text-xl text-sky-400 tabular-nums">
                            ${s.score.toLocaleString()}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        document.getElementById('limitSelect').addEventListener('change', renderTable);
        startSync();
    </script>
</body>
</html>
