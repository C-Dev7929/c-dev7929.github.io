<style>
  :root {
    --font-display: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  /* Dark theme variables */
  .dark {
    --bg-base: #0a0d14;
    --bg-surface: #111827;
    --bg-card: #1a2235;
    --bg-elevated: #243044;
    --border: #2a3a54;
    --text-primary: #e8f0fe;
    --text-secondary: #8b9dc3;
    --text-muted: #4a5a7a;
    --accent: #4f8ef7;
    --accent-glow: rgba(79,142,247,0.25);
    --accent2: #a78bfa;
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
  }

  /* Light theme variables */
  .light {
    --bg-base: #f0f4ff;
    --bg-surface: #ffffff;
    --bg-card: #f8faff;
    --bg-elevated: #edf2ff;
    --border: #dde5f5;
    --text-primary: #0f1a35;
    --text-secondary: #4a5a8a;
    --text-muted: #8b9dc3;
    --accent: #2563eb;
    --accent-glow: rgba(37,99,235,0.15);
    --accent2: #7c3aed;
    --success: #059669;
    --warning: #d97706;
    --danger: #dc2626;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-display);
    transition: background 0.3s, color 0.3s;
    overflow-x: hidden;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-base); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* Grid pattern background */
  .grid-bg {
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    background-position: -1px -1px;
  }

  /* Animations */
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse-glow { 0%,100%{ box-shadow:0 0 0 0 var(--accent-glow); } 50%{ box-shadow:0 0 20px 6px var(--accent-glow); } }
  @keyframes slide-in { from { transform:translateX(-100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
  @keyframes toast-in { from { transform:translateX(120%); opacity:0; } to { transform:translateX(0); opacity:1; } }
  @keyframes toast-out { from { transform:translateX(0); opacity:1; } to { transform:translateX(120%); opacity:0; } }
  @keyframes ring { 0%,100%{ transform:rotate(0); } 20%{ transform:rotate(15deg); } 40%{ transform:rotate(-15deg); } 60%{ transform:rotate(10deg); } 80%{ transform:rotate(-10deg); } }
  @keyframes counter { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }

  .animate-fade { animation: fadeIn 0.35s ease both; }
  .animate-slide { animation: slide-in 0.3s ease both; }
  .animate-toast-in { animation: toast-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
  .animate-toast-out { animation: toast-out 0.3s ease both; }
  .animate-pulse-glow { animation: pulse-glow 2s infinite; }
  .animate-ring { animation: ring 0.5s ease; }
  .animate-counter { animation: counter 0.3s ease; }

  /* Cards */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: all 0.2s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card-elevated {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  /* Buttons */
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    font-family: var(--font-display);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
    padding: 8px 18px;
    border-radius: 8px;
    font-family: var(--font-display);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* Tags */
  .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    font-family: var(--font-mono);
  }

  /* Sidebar */
  .sidebar {
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    width: 240px;
    flex-shrink: 0;
    height: 100vh;
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
    transition: all 0.3s;
    z-index: 50;
  }

  /* Nav items */
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--bg-elevated); color: var(--text-primary); }
  .nav-item.active {
    background: var(--accent-glow);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Progress bar */
  .progress-bar {
    height: 6px;
    border-radius: 999px;
    background: var(--bg-elevated);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* Pomodoro ring */
  .pomodoro-ring {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pomodoro-ring svg { transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--bg-elevated); stroke-width: 8; }
  .ring-fill {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }

  /* Note editor */
  .note-editor {
    width: 100%;
    min-height: 200px;
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 12px;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .note-editor:focus { border-color: var(--accent); }

  /* Star rating */
  .star { color: #fbbf24; font-size: 12px; }
  .star-empty { color: var(--text-muted); font-size: 12px; }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }
  .toast {
    pointer-events: all;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 280px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    font-size: 14px;
    font-weight: 600;
  }

  /* Mobile sidebar overlay */
  .sidebar-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 40;
    display: none;
  }
  @media (max-width: 768px) {
    .sidebar { position: fixed; transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); animation: slide-in 0.3s ease both; }
    .sidebar-overlay { display: block; }
    .main-content { margin-left: 0 !important; }
  }

  /* Category pill colors */
  .cat-0 { background: rgba(79,142,247,0.15); color: #4f8ef7; }
  .cat-1 { background: rgba(167,139,250,0.15); color: #a78bfa; }
  .cat-2 { background: rgba(52,211,153,0.15); color: #34d399; }
  .cat-3 { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .cat-4 { background: rgba(248,113,113,0.15); color: #f87171; }
  .cat-5 { background: rgba(251,146,60,0.15); color: #fb923c; }
  .cat-6 { background: rgba(34,211,238,0.15); color: #22d3ee; }
  .cat-7 { background: rgba(244,114,182,0.15); color: #f472b6; }
  .cat-8 { background: rgba(163,230,53,0.15); color: #a3e635; }
  .cat-9 { background: rgba(99,102,241,0.15); color: #6366f1; }
  .cat-10 { background: rgba(20,184,166,0.15); color: #14b8a6; }
  .cat-11 { background: rgba(245,158,11,0.15); color: #f59e0b; }

  /* Schedule grid */
  .schedule-slot {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .schedule-slot:hover { border-color: var(--accent); }
  .schedule-slot.filled { background: var(--accent-glow); border-color: var(--accent); }

  /* Chart bar */
  .chart-bar-fill {
    height: 100%;
    border-radius: 4px 4px 0 0;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1);
    min-height: 2px;
  }

  /* Completed algo */
  .algo-completed .algo-name { text-decoration: line-through; opacity: 0.6; }

  /* Focus overlay */
  .focus-mode {
    position: fixed; inset: 0;
    background: var(--bg-base);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
</style>

// =============================================
// TOAST SYSTEM
// =============================================
const ToastContext = React.createContext(null);

const ToastProvider = ({ children }) => {
  const [toasts, setToasts] = React.useState([]);
  const add = React.useCallback((msg, type = 'info', duration = 3500) => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type, leaving: false }]);
    setTimeout(() => {
      setToasts(p => p.map(t => t.id === id ? { ...t, leaving: true } : t));
      setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 350);
    }, duration);
  }, []);
  const icons = { info: '💡', success: '✅', warning: '⏰', error: '❌' };
  const borders = { info: '#4f8ef7', success: '#34d399', warning: '#fbbf24', error: '#f87171' };
  return (
    <ToastContext.Provider value={add}>
      {children}
      <div className="toast-container">
        {toasts.map(t => (
          <div key={t.id} className={`toast ${t.leaving ? 'animate-toast-out' : 'animate-toast-in'}`}
            style={{ borderLeft: `3px solid ${borders[t.type]}` }}>
            <span style={{ fontSize: 18 }}>{icons[t.type]}</span>
            <span style={{ color: 'var(--text-primary)', fontSize: 13 }}>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
};
const useToast = () => React.useContext(ToastContext);

const Pomodoro = ({ compact = false }) => {
  const toast = useToast();
  const WORK = 40 * 60, BREAK = 5 * 60;
  const [mode, setMode] = React.useState('work'); // 'work' | 'break'
  const [timeLeft, setTimeLeft] = React.useState(WORK);
  const [running, setRunning] = React.useState(false);
  const [cycles, setCycles] = React.useState(0);
  const [customWork, setCustomWork] = React.useState(40);
  const [customBreak, setCustomBreak] = React.useState(5);
  const [showSettings, setShowSettings] = React.useState(false);
  const timerRef = React.useRef(null);
  const audioCtxRef = React.useRef(null);

  // Beep sound
  const beep = React.useCallback((freq = 880, dur = 0.3, type = 'sine') => {
    try {
      if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioCtxRef.current;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = type;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + dur);
    } catch (e) {}
  }, []);

  React.useEffect(() => {
    if (running) {
      timerRef.current = setInterval(() => {
        setTimeLeft(t => {
          if (t <= 1) {
            // Switch mode
            if (mode === 'work') {
              setMode('break');
              setTimeLeft(customBreak * 60);
              setCycles(c => c + 1);
              beep(660, 0.5); beep(880, 0.3);
              toast('🎉 Hết giờ học! Nghỉ ngơi ' + customBreak + ' phút nào!', 'warning', 5000);
            } else {
              setMode('work');
              setTimeLeft(customWork * 60);
              beep(440, 0.5); beep(660, 0.3);
              toast('💪 Hết giờ nghỉ! Bắt đầu học tập trung!', 'success', 5000);
            }
            return mode === 'work' ? customBreak * 60 : customWork * 60;
          }
          return t - 1;
        });
      }, 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [running, mode, customWork, customBreak]);

  const total = mode === 'work' ? customWork * 60 : customBreak * 60;
  const progress = (total - timeLeft) / total;
  const r = compact ? 50 : 88;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - progress);
  const strokeColor = mode === 'work' ? '#4f8ef7' : '#34d399';

  const reset = () => {
    setRunning(false);
    setMode('work');
    setTimeLeft(customWork * 60);
  };

  if (compact) return (
    <div className="flex items-center gap-3 px-4 py-2 card-elevated rounded-xl">
      <div className="pomodoro-ring" style={{ width: 44, height: 44 }}>
        <svg width="44" height="44" viewBox="0 0 120 120" style={{ transform:'rotate(-90deg)' }}>
          <circle cx="60" cy="60" r={50} className="ring-track"/>
          <circle cx="60" cy="60" r={50} className="ring-fill"
            stroke={strokeColor}
            strokeDasharray={circ}
            strokeDashoffset={offset}/>
        </svg>
        <div style={{ position:'absolute', display:'flex', alignItems:'center', justifyContent:'center', inset:0 }}>
          <span style={{ fontSize: 9, fontFamily:'var(--font-mono)', color:'var(--text-primary)', fontWeight:700 }}>{fmtTime(timeLeft)}</span>
        </div>
      </div>
      <div>
        <div style={{ fontSize: 11, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:1 }}>{mode === 'work' ? 'Học tập' : 'Nghỉ'}</div>
        <div style={{ fontSize: 13, fontWeight:700, color:'var(--text-primary)', fontFamily:'var(--font-mono)' }}>{fmtTime(timeLeft)}</div>
      </div>
      <button onClick={() => setRunning(r => !r)} className="btn-primary" style={{ padding:'6px 12px', fontSize:12 }}>
        {running ? '⏸' : '▶'}
      </button>
    </div>
  );

  return (
    <div className="card p-6 animate-fade">
      <div className="flex items-center justify-between mb-6">
        <h2 style={{ fontFamily:'var(--font-display)', fontWeight:800, fontSize:22, color:'var(--text-primary)' }}>
          🍅 Pomodoro Timer
        </h2>
        <button onClick={() => setShowSettings(s => !s)} className="btn-ghost" style={{ padding:'6px 10px' }}>
          <Icon name="settings" size={14}/>
        </button>
      </div>

      {showSettings && (
        <div className="card-elevated p-4 mb-4 animate-fade grid grid-cols-2 gap-4">
          <div>
            <label style={{ fontSize:12, color:'var(--text-muted)', display:'block', marginBottom:4 }}>Học (phút)</label>
            <input type="number" min={1} max={120} value={customWork}
              onChange={e => { setCustomWork(+e.target.value); setRunning(false); setMode('work'); setTimeLeft(+e.target.value * 60); }}
              style={{ width:'100%', background:'var(--bg-base)', border:'1px solid var(--border)', borderRadius:6, padding:'6px 10px', color:'var(--text-primary)', fontFamily:'var(--font-mono)', fontSize:14 }}/>
          </div>
          <div>
            <label style={{ fontSize:12, color:'var(--text-muted)', display:'block', marginBottom:4 }}>Nghỉ (phút)</label>
            <input type="number" min={1} max={60} value={customBreak}
              onChange={e => { setCustomBreak(+e.target.value); }}
              style={{ width:'100%', background:'var(--bg-base)', border:'1px solid var(--border)', borderRadius:6, padding:'6px 10px', color:'var(--text-primary)', fontFamily:'var(--font-mono)', fontSize:14 }}/>
          </div>
        </div>
      )}

      {/* Ring */}
      <div className="flex flex-col items-center mb-6">
        <div className="pomodoro-ring" style={{ width: 200, height: 200 }}>
          <svg width="200" height="200" viewBox="0 0 200 200" style={{ transform:'rotate(-90deg)' }}>
            <circle cx="100" cy="100" r={r} className="ring-track" strokeWidth="10"/>
            <circle cx="100" cy="100" r={r} className="ring-fill"
              stroke={strokeColor} strokeWidth="10"
              strokeDasharray={circ} strokeDashoffset={offset}
              style={{ filter:`drop-shadow(0 0 8px ${strokeColor}80)` }}/>
          </svg>
          <div style={{ position:'absolute', textAlign:'center' }}>
            <div style={{ fontSize: 36, fontFamily:'var(--font-mono)', fontWeight:700, color:'var(--text-primary)', lineHeight:1 }}>{fmtTime(timeLeft)}</div>
            <div style={{ fontSize: 13, color: strokeColor, fontWeight:600, marginTop:4 }}>{mode === 'work' ? 'TẬP TRUNG' : 'NGHỈ NGƠI'}</div>
          </div>
        </div>
      </div>

      {/* Controls */}
      <div className="flex gap-3 justify-center mb-4">
        <button onClick={reset} className="btn-ghost" style={{ padding:'8px 14px' }}>
          <Icon name="rotate-ccw" size={16}/>
        </button>
        <button onClick={() => setRunning(r => !r)} className="btn-primary"
          style={{ padding:'10px 32px', fontSize:16, minWidth:120, display:'flex', alignItems:'center', gap:8, justifyContent:'center' }}
          onMouseEnter={e => running && e.currentTarget.classList.add('animate-pulse-glow')}>
          <Icon name={running ? 'pause' : 'play'} size={18}/> {running ? 'Dừng' : 'Bắt đầu'}
        </button>
        <button onClick={() => { setMode(m => m === 'work' ? 'break' : 'work'); setTimeLeft(mode === 'work' ? customBreak * 60 : customWork * 60); setRunning(false); }} className="btn-ghost" style={{ padding:'8px 14px' }}>
          <Icon name="skip-forward" size={16}/>
        </button>
      </div>

      <div className="text-center" style={{ fontSize: 13, color: 'var(--text-muted)' }}>
        <Icon name="award" size={13} className="inline mr-1"/> Đã hoàn thành <strong style={{ color: 'var(--accent)' }}>{cycles}</strong> chu kỳ hôm nay
      </div>
    </div>
  );
};

const AlgoList = ({ algorithms, completed, notes, onOpenAlgo }) => {
  const [search, setSearch] = React.useState('');
  const [filterCat, setFilterCat] = React.useState('Tất cả');
  const [filterStar, setFilterStar] = React.useState(0);
  const [filterStatus, setFilterStatus] = React.useState('all'); // 'all' | 'done' | 'todo' | 'noted'
  const [sortBy, setSortBy] = React.useState('category'); // 'category' | 'stars' | 'name'
  const [showFilters, setShowFilters] = React.useState(false);

  const categories = ['Tất cả', ...CATEGORY_ORDER.filter(c => algorithms.some(a => a.category === c))];

  const filtered = React.useMemo(() => {
    let list = [...algorithms];
    if (search) list = list.filter(a => a.name.toLowerCase().includes(search.toLowerCase()) || a.category.toLowerCase().includes(search.toLowerCase()));
    if (filterCat !== 'Tất cả') list = list.filter(a => a.category === filterCat);
    if (filterStar > 0) list = list.filter(a => a.stars === filterStar);
    if (filterStatus === 'done') list = list.filter(a => completed[a.id]);
    if (filterStatus === 'todo') list = list.filter(a => !completed[a.id]);
    if (filterStatus === 'noted') list = list.filter(a => notes[a.id]);

    if (sortBy === 'stars') list.sort((a, b) => a.stars - b.stars);
    else if (sortBy === 'name') list.sort((a, b) => a.name.localeCompare(b.name, 'vi'));
    else list.sort((a, b) => (CATEGORY_ORDER.indexOf(a.category) - CATEGORY_ORDER.indexOf(b.category)) || (a.stars - b.stars));
    return list;
  }, [algorithms, search, filterCat, filterStar, filterStatus, sortBy, completed, notes]);

  // Group by category
  const grouped = React.useMemo(() => {
    if (sortBy !== 'category') return null;
    const g = {};
    filtered.forEach(a => { if (!g[a.category]) g[a.category] = []; g[a.category].push(a); });
    return g;
  }, [filtered, sortBy]);

  return (
    <div className="animate-fade">
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <h1 style={{ fontFamily:'var(--font-display)', fontWeight:800, fontSize:24, color:'var(--text-primary)' }}>
          📚 Danh sách Thuật toán
          <span style={{ marginLeft:8, fontSize:14, color:'var(--text-muted)', fontWeight:400 }}>{filtered.length}/{algorithms.length}</span>
        </h1>
        <button onClick={() => setShowFilters(f => !f)} className="btn-ghost" style={{ display:'flex', alignItems:'center', gap:6 }}>
          <Icon name="filter" size={14}/> Bộ lọc
        </button>
      </div>

      {/* Search */}
      <div className="relative mb-4">
        <span style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', color:'var(--text-muted)' }}>
          <Icon name="search" size={15}/>
        </span>
        <input value={search} onChange={e => setSearch(e.target.value)}
          placeholder="Tìm kiếm thuật toán..."
          style={{ width:'100%', background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:10, padding:'10px 14px 10px 38px', color:'var(--text-primary)', fontFamily:'var(--font-display)', fontSize:14, outline:'none' }}
          onFocus={e => e.target.style.borderColor='var(--accent)'}
          onBlur={e => e.target.style.borderColor='var(--border)'}/>
      </div>

      {/* Filters */}
      {showFilters && (
        <div className="card-elevated p-4 mb-4 animate-fade space-y-3">
          <div>
            <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:6, fontWeight:700, textTransform:'uppercase' }}>Danh mục</div>
            <div className="flex flex-wrap gap-2">
              {categories.map(c => (
                <button key={c} onClick={() => setFilterCat(c)}
                  className={filterCat === c ? 'btn-primary' : 'btn-ghost'}
                  style={{ padding:'4px 10px', fontSize:12 }}>{c === 'Tất cả' ? c : c}</button>
              ))}
            </div>
          </div>
          <div>
            <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:6, fontWeight:700, textTransform:'uppercase' }}>Độ khó</div>
            <div className="flex gap-2 flex-wrap">
              {[0,1,2,3,4,5].map(s => (
                <button key={s} onClick={() => setFilterStar(s)}
                  className={filterStar === s ? 'btn-primary' : 'btn-ghost'}
                  style={{ padding:'4px 10px', fontSize:12 }}>
                  {s === 0 ? 'Tất cả' : '★'.repeat(s)}
                </button>
              ))}
            </div>
          </div>
          <div>
            <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:6, fontWeight:700, textTransform:'uppercase' }}>Trạng thái</div>
            <div className="flex gap-2 flex-wrap">
              {[['all','Tất cả'],['done','✓ Xong'],['todo','⏳ Chưa học'],['noted','📝 Có ghi chú']].map(([v,l]) => (
                <button key={v} onClick={() => setFilterStatus(v)}
                  className={filterStatus === v ? 'btn-primary' : 'btn-ghost'}
                  style={{ padding:'4px 10px', fontSize:12 }}>{l}</button>
              ))}
            </div>
          </div>
          <div>
            <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:6, fontWeight:700, textTransform:'uppercase' }}>Sắp xếp</div>
            <div className="flex gap-2 flex-wrap">
              {[['category','Theo danh mục'],['stars','Theo độ khó'],['name','Theo tên']].map(([v,l]) => (
                <button key={v} onClick={() => setSortBy(v)}
                  className={sortBy === v ? 'btn-primary' : 'btn-ghost'}
                  style={{ padding:'4px 10px', fontSize:12 }}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* List */}
      {grouped ? (
        Object.entries(grouped).map(([cat, algos]) => (
          <div key={cat} className="mb-6">
            <div className="flex items-center gap-2 mb-3">
              <span className={`tag ${CAT_COLORS[cat] || 'cat-0'}`}>{cat}</span>
              <span style={{ fontSize:12, color:'var(--text-muted)' }}>{algos.filter(a => completed[a.id]).length}/{algos.length}</span>
            </div>
            <div className="grid grid-cols-1 gap-2 sm:grid-cols-2">
              {algos.map(a => <AlgoCard key={a.id} algo={a} note={notes[a.id]} completed={!!completed[a.id]} onOpen={onOpenAlgo}/>)}
            </div>
          </div>
        ))
      ) : (
        <div className="grid grid-cols-1 gap-2 sm:grid-cols-2">
          {filtered.map(a => <AlgoCard key={a.id} algo={a} note={notes[a.id]} completed={!!completed[a.id]} onOpen={onOpenAlgo}/>)}
        </div>
      )}

      {filtered.length === 0 && (
        <div className="text-center py-16" style={{ color:'var(--text-muted)' }}>
          <Icon name="search" size={40} className="mx-auto mb-3 opacity-30"/>
          <div style={{ fontSize:15, fontWeight:600 }}>Không tìm thấy thuật toán nào</div>
        </div>
      )}
    </div>
  );
};


// =============================================
// SCHEDULE PAGE — 2 TAB:
//   Tab 1: Lịch học thuật toán (theo giờ & ngày)
//   Tab 2: Thời khóa biểu trường (theo tiết × thứ)
// =============================================
const Schedule = ({ algorithms, completed, notes, onOpenAlgo }) => {
  const toast = useToast();

  // ── Tab hiện tại ──────────────────────────────────────────────
  const [activeTab, setActiveTab] = React.useState('algo'); // 'algo' | 'school'

  // ════════════════════════════════════════════════════════════════
  //  TAB 1 — LỊCH HỌC THUẬT TOÁN
  // ════════════════════════════════════════════════════════════════
  const [schedule, setSchedule] = React.useState(() => LS.get('schedule', {}));
  const today = new Date().toISOString().slice(0, 10);
  const [selectedDate, setSelectedDate] = React.useState(today);
  const [showPicker, setShowPicker] = React.useState(null); // slot đang mở picker

  // Các khung giờ học trong ngày
  const SLOTS = ['07:00','08:00','09:00','10:00','14:00','15:00','16:00','19:00','20:00','21:00'];
  const daySchedule = schedule[selectedDate] || {};

  // Gán thuật toán vào khung giờ
  const assignAlgo = (slot, algoId) => {
    const updated = { ...schedule, [selectedDate]: { ...daySchedule, [slot]: algoId } };
    setSchedule(updated);
    LS.set('schedule', updated);
    setShowPicker(null);
    toast('📅 Đã thêm vào lịch!', 'success', 2000);
  };

  // Xóa thuật toán khỏi khung giờ
  const removeAlgo = (slot) => {
    const day = { ...daySchedule };
    delete day[slot];
    const updated = { ...schedule, [selectedDate]: day };
    setSchedule(updated);
    LS.set('schedule', updated);
    toast('🗑️ Đã xóa khỏi lịch', 'info', 2000);
  };

  // Lấy 7 ngày tới để hiển thị
  const days7 = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() + i);
    return d.toISOString().slice(0, 10);
  });

  // ════════════════════════════════════════════════════════════════
  //  TAB 2 — THỜI KHÓA BIỂU TRƯỜNG
  // ════════════════════════════════════════════════════════════════

  // Cấu hình các tiết học: [giờ_bắt_đầu, phút, giờ_kết_thúc, phút]
  const PERIODS = {
    s1:[7,0,7,45],  s2:[7,50,8,35],  s3:[8,45,9,30],
    s4:[9,35,10,20], s5:[10,25,11,10],
    c1:[12,45,13,30], c2:[13,35,14,20], c3:[14,30,15,15],
    c4:[15,20,16,5],  c5:[16,10,16,55]
  };
  const TKB_SLOTS   = ['s1','s2','s3','s4','s5','c1','c2','c3','c4','c5'];
  const SLOT_SHORT  = { s1:'S1', s2:'S2', s3:'S3', s4:'S4', s5:'S5', c1:'C1', c2:'C2', c3:'C3', c4:'C4', c5:'C5' };
  const SLOT_LABEL  = { s1:'Tiết 1', s2:'Tiết 2', s3:'Tiết 3', s4:'Tiết 4', s5:'Tiết 5', c1:'Tiết 6', c2:'Tiết 7', c3:'Tiết 8', c4:'Tiết 9', c5:'Tiết 10' };
  const TKB_DAYS    = ['mon','tue','wed','thu','fri','sat'];
  const DAY_LABELS  = ['T2','T3','T4','T5','T6','T7'];
  const DAY_FULL    = ['Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'];

  // Khởi tạo TKB rỗng
  const createEmptyTKB = () => {
    const tkb = {};
    TKB_SLOTS.forEach(s => { tkb[s] = {}; TKB_DAYS.forEach(d => tkb[s][d] = ''); });
    return tkb;
  };

  const [tkb, setTkb] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('algo_tkb_v1')) || createEmptyTKB(); }
    catch { return createEmptyTKB(); }
  });
  const [editingTKB, setEditingTKB] = React.useState(false); // Hiện/ẩn bảng nhập
  const [savedBadge, setSavedBadge]  = React.useState(false); // Hiện badge "Đã lưu"

  // Đồng hồ cập nhật mỗi 30s để highlight tiết hiện tại
  const [now, setNow] = React.useState(new Date());
  React.useEffect(() => {
    const timer = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(timer);
  }, []);

  // Tính tiết hiện tại (null nếu ngoài giờ học)
  const currentSlot = React.useMemo(() => {
    const total = now.getHours() * 60 + now.getMinutes();
    return TKB_SLOTS.find(s => {
      const [sh, sm, eh, em] = PERIODS[s];
      return total >= sh * 60 + sm && total < eh * 60 + em;
    }) || null;
  }, [now]);

  // Index cột hôm nay trong TKB (0=T2 ... 5=T7), null nếu là CN
  const todayColIdx = now.getDay() >= 1 && now.getDay() <= 6 ? now.getDay() - 1 : null;

  // Cập nhật ô nhập môn học và lưu localStorage ngay lập tức
  const handleTKBInput = (slot, day, value) => {
    const updated = { ...tkb, [slot]: { ...tkb[slot], [day]: value } };
    setTkb(updated);
    localStorage.setItem('algo_tkb_v1', JSON.stringify(updated));
    setSavedBadge(true);
    setTimeout(() => setSavedBadge(false), 1200);
  };

  // Xóa toàn bộ TKB
  const resetTKB = () => {
    if (!window.confirm('Xóa toàn bộ thời khóa biểu trường?')) return;
    const empty = createEmptyTKB();
    setTkb(empty);
    localStorage.setItem('algo_tkb_v1', JSON.stringify(empty));
    toast('🗑️ Đã xóa thời khóa biểu', 'warning');
  };

  // Format giờ: [7, 0] → "07:00"
  const fmtHM = (h, m) => `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

  // ════════════════════════════════════════════════════════════════
  //  RENDER
  // ════════════════════════════════════════════════════════════════
  return (
    <div className="animate-fade">

      {/* ── Tiêu đề trang ── */}
      <h1 style={{ fontFamily:'var(--font-display)', fontWeight:800, fontSize:24, color:'var(--text-primary)', marginBottom:20 }}>
        📅 Thời khóa biểu
      </h1>

      {/* ── Tab switcher ── */}
      <div style={{ display:'flex', gap:0, marginBottom:24, background:'var(--bg-elevated)', borderRadius:10, padding:4, width:'fit-content', border:'1px solid var(--border)' }}>
        {[
          { key:'algo',   icon:'calendar', label:'Lịch học Thuật toán' },
          { key:'school', icon:'clock',    label:'TKB Trường' },
        ].map(tab => (
          <button key={tab.key}
            onClick={() => setActiveTab(tab.key)}
            style={{
              display:'flex', alignItems:'center', gap:7,
              padding:'8px 18px', borderRadius:7, border:'none',
              fontFamily:'var(--font-display)', fontWeight:700, fontSize:13,
              cursor:'pointer', transition:'all 0.2s',
              background: activeTab === tab.key ? 'var(--accent)' : 'transparent',
              color:       activeTab === tab.key ? '#fff' : 'var(--text-secondary)',
              boxShadow:   activeTab === tab.key ? '0 2px 8px var(--accent-glow)' : 'none',
            }}>
            <Icon name={tab.icon} size={14}/>
            {tab.label}
          </button>
        ))}
      </div>

      {/* ════════════════════════════════════
           TAB 1: LỊCH HỌC THUẬT TOÁN
          ════════════════════════════════════ */}
      {activeTab === 'algo' && (
        <div className="animate-fade">

          {/* Chọn ngày (7 ngày tới) */}
          <div style={{ display:'flex', gap:8, overflowX:'auto', paddingBottom:8, marginBottom:20 }}>
            {days7.map(d => {
              const date  = new Date(d + 'T00:00:00');
              const slots = Object.keys(schedule[d] || {}).length;
              return (
                <button key={d} onClick={() => setSelectedDate(d)}
                  className={selectedDate === d ? 'btn-primary' : 'btn-ghost'}
                  style={{ flexShrink:0, padding:'8px 14px', display:'flex', flexDirection:'column', alignItems:'center', gap:2 }}>
                  <span style={{ fontSize:11, textTransform:'uppercase' }}>
                    {date.toLocaleDateString('vi-VN', { weekday:'short' })}
                  </span>
                  <span style={{ fontFamily:'var(--font-mono)', fontWeight:800, fontSize:16 }}>{date.getDate()}</span>
                  {slots > 0 && (
                    <span style={{ fontSize:9, background:'var(--accent)', color:'white', borderRadius:8, padding:'1px 5px' }}>{slots}</span>
                  )}
                </button>
              );
            })}
          </div>

          {/* Danh sách khung giờ */}
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {SLOTS.map(slot => {
              const algoId = daySchedule[slot];
              const algo   = algoId ? algorithms.find(a => a.id === algoId) : null;
              return (
                <div key={slot} style={{ display:'flex', alignItems:'center', gap:14 }}>
                  {/* Nhãn giờ */}
                  <div style={{ width:52, flexShrink:0, fontFamily:'var(--font-mono)', fontSize:12, color:'var(--text-muted)', fontWeight:700 }}>{slot}</div>

                  {/* Slot có thuật toán */}
                  {algo ? (
                    <div className="schedule-slot filled" style={{ flex:1, display:'flex', alignItems:'center', gap:10 }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)' }}>{algo.name}</div>
                        <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:1 }}>{algo.category} · <Stars n={algo.stars}/></div>
                      </div>
                      <button onClick={() => onOpenAlgo(algo)} className="btn-primary" style={{ padding:'4px 8px', fontSize:11 }}>Học</button>
                      <button onClick={() => removeAlgo(slot)} className="btn-ghost" style={{ padding:'4px 8px', fontSize:11, color:'var(--danger)' }}>✕</button>
                    </div>
                  ) : (
                    /* Slot trống */
                    <div className="schedule-slot" style={{ flex:1, display:'flex', alignItems:'center', gap:8, cursor:'pointer', background: showPicker === slot ? 'var(--bg-elevated)' : 'transparent' }}
                      onClick={() => setShowPicker(showPicker === slot ? null : slot)}>
                      <Icon name="plus" size={14} style={{ color:'var(--text-muted)' }}/>
                      <span style={{ fontSize:13, color:'var(--text-muted)' }}>Thêm thuật toán...</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Picker chọn thuật toán */}
          {showPicker !== null && (
            <div className="card p-4 animate-fade" style={{ marginTop:14 }}>
              <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', marginBottom:10 }}>
                Chọn thuật toán cho {showPicker}:
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(240px,1fr))', gap:8, maxHeight:300, overflowY:'auto' }}>
                {algorithms.filter(a => !completed[a.id]).slice(0, 30).map(a => (
                  <div key={a.id} className="card-elevated" style={{ padding:12, cursor:'pointer', border:'1px solid transparent', borderRadius:8, transition:'border-color 0.2s' }}
                    onMouseEnter={e => e.currentTarget.style.borderColor='var(--accent)'}
                    onMouseLeave={e => e.currentTarget.style.borderColor='transparent'}
                    onClick={() => assignAlgo(showPicker, a.id)}>
                    <div style={{ fontSize:13, fontWeight:600, color:'var(--text-primary)' }}>{a.name}</div>
                    <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:2 }}>{a.category}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ════════════════════════════════════
           TAB 2: THỜI KHÓA BIỂU TRƯỜNG
          ════════════════════════════════════ */}
      {activeTab === 'school' && (
        <div className="animate-fade">

          {/* Thanh công cụ */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16, flexWrap:'wrap', gap:10 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              {/* Badge tự động lưu */}
              {savedBadge && (
                <span style={{ fontSize:12, color:'var(--success)', background:'rgba(52,211,153,0.12)', padding:'4px 12px', borderRadius:20, fontWeight:700, fontFamily:'var(--font-mono)' }}>
                  ✓ Đã lưu
                </span>
              )}
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button className="btn-primary" onClick={() => setEditingTKB(e => !e)}
                style={{ display:'flex', alignItems:'center', gap:6 }}>
                <Icon name={editingTKB ? 'x' : 'plus'} size={14}/>
                {editingTKB ? 'Đóng nhập TKB' : '✏️ Nhập / Sửa TKB'}
              </button>
              {editingTKB && (
                <button className="btn-ghost" onClick={resetTKB}
                  style={{ color:'var(--danger)', borderColor:'var(--danger)', display:'flex', alignItems:'center', gap:6 }}>
                  <Icon name="trash" size={14}/> Xóa hết
                </button>
              )}
            </div>
          </div>

          {/* Banner tiết hiện tại */}
          {currentSlot && todayColIdx !== null && tkb[currentSlot] && (
            <div className="card animate-fade" style={{ borderColor:'var(--accent)', background:'var(--accent-glow)', padding:'14px 18px', marginBottom:16, display:'flex', alignItems:'center', gap:14 }}>
              <span style={{ fontSize:26 }}>⏰</span>
              <div>
                <div style={{ fontSize:11, color:'var(--accent)', fontWeight:700, textTransform:'uppercase', fontFamily:'var(--font-mono)', marginBottom:3 }}>
                  Đang diễn ra · {SLOT_SHORT[currentSlot]}&nbsp;
                  {fmtHM(PERIODS[currentSlot][0], PERIODS[currentSlot][1])}–{fmtHM(PERIODS[currentSlot][2], PERIODS[currentSlot][3])}
                </div>
                <div style={{ fontSize:20, fontWeight:800, color:'var(--text-primary)', fontFamily:'var(--font-display)' }}>
                  {tkb[currentSlot][TKB_DAYS[todayColIdx]] || '(Trống tiết)'}
                </div>
                <div style={{ fontSize:12, color:'var(--text-secondary)', marginTop:2 }}>
                  {DAY_FULL[todayColIdx]}
                </div>
              </div>
            </div>
          )}

          {/* ── Bảng nhập TKB (toggle) ── */}
          {editingTKB && (
            <div className="card animate-fade" style={{ padding:16, marginBottom:20, overflowX:'auto' }}>
              <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', marginBottom:12 }}>
                ✏️ Nhập tên môn học — tự động lưu khi gõ
              </div>
              <table style={{ width:'100%', borderCollapse:'collapse', minWidth:540 }}>
                <thead>
                  <tr>
                    {/* Header: Tiết */}
                    <th style={{ padding:'6px 10px', textAlign:'left', fontSize:11, color:'var(--text-muted)', fontWeight:700, textTransform:'uppercase', fontFamily:'var(--font-mono)', borderBottom:'1px solid var(--border)', whiteSpace:'nowrap' }}>Tiết</th>
                    {/* Header: T2–T7, tô sáng ngày hôm nay */}
                    {DAY_LABELS.map((d, i) => (
                      <th key={d} style={{ padding:'6px 8px', textAlign:'center', fontSize:11, color: todayColIdx === i ? 'var(--accent)' : 'var(--text-muted)', fontWeight:700, textTransform:'uppercase', fontFamily:'var(--font-mono)', borderBottom:'1px solid var(--border)' }}>{d}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {/* Phân nhóm Buổi sáng / Buổi chiều */}
                  {['s','c'].map(session => (
                    <React.Fragment key={session}>
                      {/* Header nhóm */}
                      <tr>
                        <td colSpan={7} style={{ padding:'8px 10px 3px', fontSize:10, color:'var(--text-muted)', fontWeight:700, textTransform:'uppercase', fontFamily:'var(--font-mono)', letterSpacing:1 }}>
                          {session === 's' ? '☀️ Buổi sáng' : '🌤️ Buổi chiều'}
                        </td>
                      </tr>
                      {TKB_SLOTS.filter(s => s.startsWith(session)).map(slot => {
                        const [sh, sm, eh, em] = PERIODS[slot];
                        const isNowRow = currentSlot === slot;
                        return (
                          <tr key={slot} style={{ background: isNowRow ? 'var(--accent-glow)' : 'transparent', transition:'background 0.3s' }}>
                            {/* Nhãn tiết + giờ */}
                            <td style={{ padding:'3px 10px', whiteSpace:'nowrap' }}>
                              <span style={{ fontFamily:'var(--font-mono)', fontWeight:700, fontSize:12, color: isNowRow ? 'var(--accent)' : 'var(--text-secondary)' }}>
                                {SLOT_SHORT[slot]}
                              </span>
                              <span style={{ fontSize:10, color:'var(--text-muted)', marginLeft:6, fontFamily:'var(--font-mono)' }}>
                                {fmtHM(sh, sm)}
                              </span>
                            </td>
                            {/* Ô nhập môn học cho từng thứ */}
                            {TKB_DAYS.map((day, i) => (
                              <td key={day} style={{ padding:'3px 4px' }}>
                                <input type="text"
                                  value={tkb[slot][day]}
                                  placeholder="—"
                                  onChange={e => handleTKBInput(slot, day, e.target.value)}
                                  style={{
                                    width:'100%', background:'transparent', border:'none',
                                    borderBottom:`1px solid ${todayColIdx === i ? 'var(--accent)' : 'var(--border)'}`,
                                    color:'var(--text-primary)', fontFamily:'var(--font-display)',
                                    fontSize:12, padding:'6px 4px', outline:'none', textAlign:'center',
                                    transition:'background 0.2s', borderRadius:0,
                                  }}
                                  onFocus={e => e.target.style.background='var(--bg-elevated)'}
                                  onBlur={e  => e.target.style.background='transparent'}
                                />
                              </td>
                            ))}
                          </tr>
                        );
                      })}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* ── Preview: Hôm nay & Ngày mai ── */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
            {[0, 1].map(offset => {
              const d       = new Date(now); d.setDate(d.getDate() + offset);
              const dIdx    = d.getDay();       // 0 = CN
              const colIdx  = dIdx >= 1 && dIdx <= 6 ? dIdx - 1 : null;
              const label   = offset === 0 ? '📆 Hôm nay' : '🗓️ Ngày mai';
              const dayName = dIdx === 0 ? 'Chủ Nhật' : DAY_FULL[colIdx];

              // Lọc các tiết có môn học
              const filledSlots = colIdx !== null
                ? TKB_SLOTS.filter(s => tkb[s] && tkb[s][TKB_DAYS[colIdx]])
                : [];

              return (
                <div key={offset} className="card" style={{ padding:'14px 16px' }}>
                  {/* Tiêu đề cột */}
                  <div style={{ fontWeight:700, color:'var(--text-primary)', marginBottom:10, fontSize:14, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <span>{label}</span>
                    <span style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)' }}>{dayName}</span>
                  </div>

                  {/* Chủ nhật không có tiết */}
                  {dIdx === 0 ? (
                    <div style={{ fontSize:13, color:'var(--text-muted)', padding:'8px 0' }}>🏖️ Chủ Nhật — Không có tiết học</div>
                  ) : filledSlots.length === 0 ? (
                    <div style={{ fontSize:13, color:'var(--text-muted)', padding:'8px 0' }}>✨ Không có tiết học</div>
                  ) : (
                    filledSlots.map(slot => {
                      const [sh, sm] = PERIODS[slot];
                      const isNow    = offset === 0 && slot === currentSlot;
                      return (
                        <div key={slot} style={{ display:'flex', alignItems:'center', gap:10, padding:'6px 0', borderBottom:'1px solid var(--border)' }}>
                          {/* Badge tiết */}
                          <span style={{ fontFamily:'var(--font-mono)', fontWeight:700, fontSize:11, padding:'2px 7px', borderRadius:6, flexShrink:0, background: isNow ? 'var(--accent)' : 'var(--bg-elevated)', color: isNow ? '#fff' : 'var(--text-secondary)' }}>
                            {SLOT_SHORT[slot]}
                          </span>
                          {/* Giờ */}
                          <span style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)', flexShrink:0 }}>
                            {fmtHM(sh, sm)}
                          </span>
                          {/* Tên môn */}
                          <span style={{ fontSize:13, fontWeight:600, color: isNow ? 'var(--accent)' : 'var(--text-primary)', flex:1 }}>
                            {tkb[slot][TKB_DAYS[colIdx]]}
                          </span>
                          {/* Indicator đang học */}
                          {isNow && (
                            <span style={{ fontSize:10, color:'var(--accent)', fontWeight:700, fontFamily:'var(--font-mono)', flexShrink:0 }}>▶ NOW</span>
                          )}
                        </div>
                      );
                    })
                  )}
                </div>
              );
            })}
          </div>

          {/* Responsive: 2 cột → 1 cột trên mobile */}
          <style>{`@media (max-width: 560px) { .tkb-preview-grid { grid-template-columns: 1fr !important; } }`}</style>

        </div>
      )}
    </div>
  );
};

// =============================================
// SETTINGS PAGE
// =============================================
const Settings = ({ darkMode, setDarkMode, completed, setCompleted, notes, setNotes }) => {
  const toast = useToast();
  const completedCount = Object.values(completed).filter(Boolean).length;
  const notedCount = Object.keys(notes).length;

  const resetProgress = () => {
    if (!window.confirm('Xóa toàn bộ tiến độ? Hành động này không thể hoàn tác.')) return;
    setCompleted({});
    LS.set('completed', {});
    toast('🗑️ Đã xóa tiến độ', 'warning');
  };

  const resetNotes = () => {
    if (!window.confirm('Xóa toàn bộ ghi chú?')) return;
    setNotes({});
    LS.set('algo_notes', {});
    toast('🗑️ Đã xóa ghi chú', 'warning');
  };

  const exportData = () => {
    const data = { completed, notes, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `algomaster-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
    toast('📦 Đã xuất dữ liệu!', 'success');
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.completed) { setCompleted(data.completed); LS.set('completed', data.completed); }
        if (data.notes) { setNotes(data.notes); LS.set('algo_notes', data.notes); }
        toast('✅ Đã nhập dữ liệu thành công!', 'success');
      } catch { toast('❌ File không hợp lệ', 'error'); }
    };
    reader.readAsText(file);
  };

  return (
    <div className="animate-fade max-w-xl">
      <h1 style={{ fontFamily:'var(--font-display)', fontWeight:800, fontSize:24, color:'var(--text-primary)', marginBottom:24 }}>
        ⚙️ Cài đặt
      </h1>

      <div className="space-y-4">
        {/* Theme */}
        <div className="card p-5">
          <h3 style={{ fontWeight:700, color:'var(--text-primary)', marginBottom:12 }}>🎨 Giao diện</h3>
          <div className="flex items-center justify-between">
            <span style={{ fontSize:14, color:'var(--text-secondary)' }}>Chế độ {darkMode ? 'Tối (Dark)' : 'Sáng (Light)'}</span>
            <button onClick={() => setDarkMode(d => !d)} className="btn-primary"
              style={{ display:'flex', alignItems:'center', gap:6 }}>
              <Icon name={darkMode ? 'sun' : 'moon'} size={14}/>
              Chuyển sang {darkMode ? 'Light' : 'Dark'}
            </button>
          </div>
        </div>

        {/* Stats */}
        <div className="card p-5">
          <h3 style={{ fontWeight:700, color:'var(--text-primary)', marginBottom:12 }}>📊 Thống kê</h3>
          <div className="grid grid-cols-2 gap-3">
            <div className="card-elevated p-3 text-center">
              <div style={{ fontFamily:'var(--font-mono)', fontWeight:800, fontSize:24, color:'var(--success)' }}>{completedCount}</div>
              <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:2 }}>Đã hoàn thành</div>
            </div>
            <div className="card-elevated p-3 text-center">
              <div style={{ fontFamily:'var(--font-mono)', fontWeight:800, fontSize:24, color:'var(--accent2)' }}>{notedCount}</div>
              <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:2 }}>Có ghi chú</div>
            </div>
          </div>
        </div>

        {/* Data management */}
        <div className="card p-5">
          <h3 style={{ fontWeight:700, color:'var(--text-primary)', marginBottom:12 }}>💾 Quản lý dữ liệu</h3>
          <div className="space-y-3">
            <button onClick={exportData} className="btn-primary w-full" style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
              <Icon name="save" size={14}/> Xuất dữ liệu (JSON)
            </button>
            <label className="btn-ghost w-full cursor-pointer" style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6, textAlign:'center' }}>
              <Icon name="plus" size={14}/> Nhập dữ liệu (JSON)
              <input type="file" accept=".json" style={{ display:'none' }} onChange={importData}/>
            </label>
          </div>
        </div>

        {/* Danger zone */}
        <div className="card p-5" style={{ borderColor:'rgba(248,113,113,0.3)' }}>
          <h3 style={{ fontWeight:700, color:'var(--danger)', marginBottom:12 }}>⚠️ Khu vực nguy hiểm</h3>
          <div className="space-y-3">
            <button onClick={resetProgress} className="btn-ghost w-full" style={{ color:'var(--danger)', borderColor:'var(--danger)', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
              <Icon name="trash" size={14}/> Xóa tiến độ học tập
            </button>
            <button onClick={resetNotes} className="btn-ghost w-full" style={{ color:'var(--danger)', borderColor:'var(--danger)', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
              <Icon name="trash" size={14}/> Xóa tất cả ghi chú
            </button>
          </div>
        </div>

        {/* About */}
        <div className="card-elevated p-5 text-center">
          <div style={{ fontFamily:'var(--font-display)', fontWeight:800, fontSize:18, color:'var(--accent)', marginBottom:4 }}>AlgoMaster Planner</div>
          <div style={{ fontSize:12, color:'var(--text-muted)' }}>Dữ liệu từ <a href="https://wiki.vnoi.info" target="_blank" style={{ color:'var(--accent)' }}>VNOI Wiki</a> · 127 thuật toán</div>
          <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:4 }}>Dữ liệu được lưu tại LocalStorage của trình duyệt</div>
        </div>
      </div>
    </div>
  );
};

// =============================================
// MAIN APP
// =============================================
const App = () => {
  const [page, setPage] = React.useState('dashboard');
  const [darkMode, setDarkMode] = React.useState(() => LS.get('darkMode', true));
  const [completed, setCompleted] = React.useState(() => LS.get('completed', {}));
  const [notes, setNotes] = React.useState(() => LS.get('algo_notes', {}));
  const [selectedAlgo, setSelectedAlgo] = React.useState(null);
  const [sidebarOpen, setSidebarOpen] = React.useState(false);

  // Apply dark/light mode
  React.useEffect(() => {
    document.body.className = darkMode ? 'dark' : 'light';
    LS.set('darkMode', darkMode);
  }, [darkMode]);

  const toggleComplete = (id) => {
    const updated = { ...completed, [id]: !completed[id] };
    setCompleted(updated);
    LS.set('completed', updated);
  };

  const navItems = [
    { key:'dashboard', icon:'home', label:'Dashboard' },
    { key:'algorithms', icon:'list', label:'Thuật toán' },
    { key:'schedule', icon:'calendar', label:'Thời khóa biểu' },
    { key:'settings', icon:'settings', label:'Cài đặt' },
  ];

  const completedCount = Object.values(completed).filter(Boolean).length;
  const pct = Math.round((completedCount / ALGORITHMS.length) * 100);

  const Sidebar = () => (
    <div className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
      {/* Logo */}
      <div style={{ padding:'20px 16px 16px', borderBottom:'1px solid var(--border)' }}>
        <div style={{ fontFamily:'var(--font-display)', fontWeight:800, fontSize:20, color:'var(--text-primary)', display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ fontSize:22 }}>⚡</span>
          <span>AlgoMaster</span>
        </div>
        <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:2, fontFamily:'var(--font-mono)' }}>
          {completedCount}/{ALGORITHMS.length} · {pct}%
        </div>
        <div className="progress-bar" style={{ marginTop:6 }}>
          <div className="progress-fill" style={{ width:`${pct}%` }}/>
        </div>
      </div>

      {/* Nav */}
      <nav style={{ padding:'12px 10px', flex:1 }}>
        {navItems.map(item => (
          <div key={item.key} className={`nav-item ${page === item.key ? 'active' : ''}`}
            onClick={() => { setPage(item.key); setSidebarOpen(false); }}>
            <Icon name={item.icon} size={16}/>
            <span>{item.label}</span>
          </div>
        ))}
      </nav>

      {/* Pomodoro compact */}
      <div style={{ padding:'10px 10px 16px' }}>
        <Pomodoro compact/>
      </div>

      {/* Theme toggle */}
      <div style={{ padding:'10px 10px 16px', borderTop:'1px solid var(--border)' }}>
        <button className="nav-item w-full" onClick={() => setDarkMode(d => !d)}>
          <Icon name={darkMode ? 'sun' : 'moon'} size={16}/>
          <span>{darkMode ? 'Light Mode' : 'Dark Mode'}</span>
        </button>
      </div>
    </div>
  );

  return (
    <ToastProvider>
      <div style={{ display:'flex', minHeight:'100vh', background:'var(--bg-base)' }}>
        {/* Mobile overlay */}
        {sidebarOpen && <div className="sidebar-overlay" onClick={() => setSidebarOpen(false)}/>}

        <Sidebar/>

        {/* Main */}
        <div style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column' }}>
          {/* Mobile header */}
          <div style={{ display:'none', alignItems:'center', gap:12, padding:'14px 16px', borderBottom:'1px solid var(--border)', background:'var(--bg-surface)', position:'sticky', top:0, zIndex:30 }}
            className="md:hidden mobile-header">
            <button onClick={() => setSidebarOpen(true)} className="btn-ghost" style={{ padding:'8px' }}>
              <Icon name="menu" size={18}/>
            </button>
            <span style={{ fontFamily:'var(--font-display)', fontWeight:800, fontSize:18, color:'var(--text-primary)' }}>⚡ AlgoMaster</span>
          </div>

          <style>{`.mobile-header { display: flex !important; } @media(min-width:769px){ .mobile-header { display: none !important; } }`}</style>

          {/* Content */}
          <div style={{ flex:1, padding:'24px', maxWidth:960, width:'100%', margin:'0 auto' }}>
            {page === 'dashboard' && <Dashboard algorithms={ALGORITHMS} completed={completed} notes={notes} onOpenAlgo={setSelectedAlgo}/>}
            {page === 'algorithms' && <AlgoList algorithms={ALGORITHMS} completed={completed} notes={notes} onOpenAlgo={setSelectedAlgo}/>}
            {page === 'schedule' && <Schedule algorithms={ALGORITHMS} completed={completed} notes={notes} onOpenAlgo={setSelectedAlgo}/>}
            {page === 'settings' && <Settings darkMode={darkMode} setDarkMode={setDarkMode} completed={completed} setCompleted={setCompleted} notes={notes} setNotes={setNotes}/>}
          </div>
        </div>

        {/* Modal */}
        {selectedAlgo && (
          <AlgoModal
            algo={selectedAlgo}
            onClose={() => setSelectedAlgo(null)}
            notes={notes} setNotes={setNotes}
            completed={completed}
            onToggleComplete={toggleComplete}
          />
        )}
      </div>
    </ToastProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
